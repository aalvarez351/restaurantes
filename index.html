
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR Restaurant AR Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-ar@1.0.0/dist/aframe-ar.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="menuPanel"></div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

<a-assets></a-assets>

<a-camera position="0 1.6 0">

<!-- Objects always visible in front of the camera -->
<a-entity position="0 -0.5 -1">

<a-cylinder color="#C68642" radius="0.3" height="0.1" position="0 0 0"></a-cylinder>
<a-box color="#8B4513" depth="0.6" height="0.1" width="0.6" position="0 0.1 0"></a-box>
<a-cylinder color="#C68642" radius="0.3" height="0.1" position="0 0.2 0"></a-cylinder>

</a-entity>

<a-box color="red" position="-0.6 -0.3 -1" depth="0.3" height="0.4" width="0.3"></a-box>

<a-cylinder color="#222" radius="0.1" height="0.5" position="0.6 -0.2 -1"></a-cylinder>

<a-sphere color="yellow" radius="0.2" position="0.3 0 -1"></a-sphere>

</a-camera>

<a-light type="ambient" intensity="1"></a-light>
<a-light type="directional" position="1 3 2"></a-light>

</a-scene>

<script src="app.js"></script>

</body>
</html>
