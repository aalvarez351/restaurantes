
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Restaurant XR Demo</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍔 XR Restaurant Demo</h1>

<div id="status">Checking device capabilities...</div>

<!-- IMAGE CAROUSEL (always visible) -->
<div class="carousel">
<img id="carouselImage" src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<div class="controls">
<button onclick="prev()">◀</button>
<button onclick="next()">▶</button>
</div>
</div>

<h2>3D Food Viewer</h2>

<model-viewer
src="https://modelviewer.dev/shared-assets/models/Hamburger.glb"
alt="Burger 3D"
auto-rotate
camera-controls
ar
ar-modes="webxr scene-viewer quick-look"
style="width:100%; height:400px;">
</model-viewer>

<h2>Extra 3D Items</h2>

<div class="models">

<model-viewer
src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
auto-rotate
camera-controls
style="width:100%; height:300px;">
</model-viewer>

<model-viewer
src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"
auto-rotate
camera-controls
style="width:100%; height:300px;">
</model-viewer>

<model-viewer
src="https://modelviewer.dev/shared-assets/models/NeilArmstrong.glb"
auto-rotate
camera-controls
style="width:100%; height:300px;">
</model-viewer>

</div>

<script src="app.js"></script>

</body>
</html>
