
<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AR Restaurant Menu</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-ar@1.0.0/dist/aframe-ar.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="menuPanel"></div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

<a-camera>

<a-entity position="0 -0.4 -1.2">

<a-cylinder color="#d8a35d" radius="0.35" height="0.12"></a-cylinder>
<a-box color="#5b3a1a" width="0.7" height="0.12" depth="0.7" position="0 0.12 0"></a-box>
<a-cylinder color="#d8a35d" radius="0.35" height="0.12" position="0 0.24 0"></a-cylinder>

</a-entity>

<a-box color="red" width="0.4" height="0.45" depth="0.4" position="-0.7 -0.3 -1.2"></a-box>

<a-cylinder color="#222" radius="0.18" height="0.6" position="0.7 -0.2 -1.2"></a-cylinder>

<a-sphere color="yellow" radius="0.25" position="0.2 0.1 -1.1"></a-sphere>

</a-camera>

<a-light type="ambient" intensity="1"></a-light>

</a-scene>

<script src="app.js"></script>

</body>
</html>
